<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Kharch — Expense Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0e0e10;
    --surface: #17171a;
    --surface2: #1f1f24;
    --border: #2a2a30;
    --accent: #c8f566;
    --accent2: #7ee8a2;
    --text: #f0f0f0;
    --muted: #888;
    --danger: #ff6b6b;
    --cat-food: #ffd166;
    --cat-transport: #06d6a0;
    --cat-housing: #118ab2;
    --cat-utilities: #8338ec;
    --cat-healthcare: #ef476f;
    --cat-entertainment: #ff9f1c;
    --cat-education: #2ec4b6;
    --cat-shopping: #e76f51;
    --cat-travel: #4cc9f0;
    --cat-other: #adb5bd;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    line-height: 1.5;
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 1000;
    opacity: 0.4;
  }

  .layout {
    max-width: 980px;
    margin: 0 auto;
    padding: 0 1.5rem 4rem;
  }

  header {
    padding: 2.5rem 0 2rem;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    margin-bottom: 2rem;
  }

  .logo {
    font-family: 'DM Serif Display', serif;
    font-size: 2.2rem;
    letter-spacing: -0.02em;
    color: var(--accent);
    line-height: 1;
  }
  .logo span { font-style: italic; color: var(--text); }

  .total-pill {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 0.5rem 1.2rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.95rem;
    color: var(--accent);
    transition: all 0.3s;
  }
  .total-pill .label { color: var(--muted); margin-right: 0.4rem; font-size: 0.8rem; }

  .main-grid {
    display: grid;
    grid-template-columns: 340px 1fr;
    gap: 1.5rem;
    align-items: start;
  }

  /* Form Panel */
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.5rem;
    position: sticky;
    top: 1.5rem;
  }

  .panel-title {
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 1.2rem;
  }

  .field { margin-bottom: 1rem; }
  .field label {
    display: block;
    font-size: 0.78rem;
    font-weight: 500;
    color: var(--muted);
    margin-bottom: 0.35rem;
    letter-spacing: 0.04em;
  }

  input, select, textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    padding: 0.65rem 0.9rem;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    -webkit-appearance: none;
  }
  input:focus, select:focus, textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(200,245,102,0.08);
  }
  input::placeholder { color: #555; }
  textarea { resize: vertical; min-height: 64px; }

  select option { background: var(--surface2); }

  .amount-wrap { position: relative; }
  .amount-wrap .currency {
    position: absolute; left: 0.9rem; top: 50%; transform: translateY(-50%);
    color: var(--muted); font-family: 'DM Mono', monospace; font-size: 0.85rem;
    pointer-events: none;
  }
  .amount-wrap input { padding-left: 1.8rem; font-family: 'DM Mono', monospace; }

  .btn-primary {
    width: 100%;
    background: var(--accent);
    color: #0e0e10;
    border: none;
    border-radius: 10px;
    padding: 0.75rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    margin-top: 0.5rem;
    transition: opacity 0.2s, transform 0.1s;
    letter-spacing: 0.01em;
  }
  .btn-primary:hover { opacity: 0.9; }
  .btn-primary:active { transform: scale(0.98); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Toast */
  .toast-wrap {
    position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
    z-index: 999; display: flex; flex-direction: column; align-items: center; gap: 0.5rem;
  }
  .toast {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.65rem 1.2rem;
    font-size: 0.85rem;
    animation: slideUp 0.25s ease, fadeOut 0.3s ease 2.5s forwards;
    white-space: nowrap;
  }
  .toast.error { border-color: var(--danger); color: var(--danger); }
  .toast.success { border-color: var(--accent2); color: var(--accent2); }
  @keyframes slideUp { from { opacity:0; transform: translateY(10px); } to { opacity:1; transform: translateY(0); } }
  @keyframes fadeOut { to { opacity: 0; } }

  /* Right panel */
  .right-panel {}

  .controls {
    display: flex;
    gap: 0.75rem;
    margin-bottom: 1rem;
    flex-wrap: wrap;
  }

  .filter-select {
    flex: 1;
    min-width: 140px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.55rem 0.9rem;
    color: var(--text);
    font-size: 0.85rem;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    outline: none;
    transition: border-color 0.2s;
  }
  .filter-select:focus { border-color: var(--accent); }

  .toggle-sort {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.55rem 1rem;
    color: var(--muted);
    font-size: 0.82rem;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .toggle-sort.active { border-color: var(--accent); color: var(--accent); }

  /* Expense list */
  .expense-list { display: flex; flex-direction: column; gap: 0.6rem; }

  .expense-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1rem 1.2rem;
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: center;
    gap: 0.8rem;
    transition: border-color 0.2s, transform 0.15s;
    animation: cardIn 0.2s ease;
  }
  .expense-card:hover { border-color: #3a3a44; transform: translateX(2px); }
  @keyframes cardIn { from { opacity:0; transform: translateY(6px); } to { opacity:1; transform: translateY(0); } }

  .cat-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .card-body {}
  .card-desc {
    font-size: 0.9rem;
    font-weight: 500;
    color: var(--text);
  }
  .card-meta {
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: 0.15rem;
    display: flex;
    gap: 0.6rem;
    align-items: center;
  }
  .cat-badge {
    font-size: 0.68rem;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 0.1rem 0.45rem;
    border-radius: 999px;
    background: rgba(255,255,255,0.06);
  }

  .card-amount {
    font-family: 'DM Mono', monospace;
    font-size: 1rem;
    font-weight: 500;
    color: var(--text);
    text-align: right;
    white-space: nowrap;
  }

  .empty-state {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--muted);
    border: 1px dashed var(--border);
    border-radius: 16px;
  }
  .empty-state .icon { font-size: 2.5rem; margin-bottom: 1rem; }
  .empty-state p { font-size: 0.9rem; }

  .loading {
    text-align: center;
    padding: 3rem;
    color: var(--muted);
    font-size: 0.85rem;
  }

  .error-state {
    text-align: center;
    padding: 2rem;
    color: var(--danger);
    font-size: 0.85rem;
    border: 1px solid rgba(255,107,107,0.2);
    border-radius: 12px;
  }

  .count-label {
    font-size: 0.75rem;
    color: var(--muted);
    margin-bottom: 0.75rem;
    font-family: 'DM Mono', monospace;
  }

  @media (max-width: 700px) {
    .main-grid { grid-template-columns: 1fr; }
    .panel { position: static; }
  }
</style>
</head>
<body>
<div class="layout">
  <header>
    <div class="logo">Kharch<span>.</span></div>
    <div class="total-pill">
      <span class="label">Total</span>
      <span id="total-display">₹0.00</span>
    </div>
  </header>

  <div class="main-grid">
    <!-- Add Expense Form -->
    <aside class="panel">
      <div class="panel-title">New Expense</div>
      <form id="expense-form" onsubmit="return false">
        <div class="field">
          <label>Amount (₹)</label>
          <div class="amount-wrap">
            <span class="currency">₹</span>
            <input type="number" id="amount" placeholder="0.00" min="0.01" step="0.01" required/>
          </div>
        </div>
        <div class="field">
          <label>Category</label>
          <select id="category" required>
            <option value="" disabled selected>Select category</option>
            <option value="food">🍜 Food</option>
            <option value="transport">🚌 Transport</option>
            <option value="housing">🏠 Housing</option>
            <option value="utilities">💡 Utilities</option>
            <option value="healthcare">🏥 Healthcare</option>
            <option value="entertainment">🎬 Entertainment</option>
            <option value="education">📚 Education</option>
            <option value="shopping">🛍️ Shopping</option>
            <option value="travel">✈️ Travel</option>
            <option value="other">📦 Other</option>
          </select>
        </div>
        <div class="field">
          <label>Description</label>
          <textarea id="description" placeholder="What did you spend on?" required rows="2"></textarea>
        </div>
        <div class="field">
          <label>Date</label>
          <input type="date" id="date" required/>
        </div>
        <button class="btn-primary" id="submit-btn" type="submit" onclick="submitExpense()">
          Add Expense
        </button>
      </form>
    </aside>

    <!-- Expense List -->
    <section class="right-panel">
      <div class="controls">
        <select class="filter-select" id="filter-category" onchange="loadExpenses()">
          <option value="">All categories</option>
          <option value="food">Food</option>
          <option value="transport">Transport</option>
          <option value="housing">Housing</option>
          <option value="utilities">Utilities</option>
          <option value="healthcare">Healthcare</option>
          <option value="entertainment">Entertainment</option>
          <option value="education">Education</option>
          <option value="shopping">Shopping</option>
          <option value="travel">Travel</option>
          <option value="other">Other</option>
        </select>
        <button class="toggle-sort" id="sort-btn" onclick="toggleSort()">
          ↕ Date: Newest first
        </button>
      </div>

      <div id="count-label" class="count-label"></div>
      <div id="expense-list">
        <div class="loading">Loading expenses…</div>
      </div>
    </section>
  </div>
</div>

<div class="toast-wrap" id="toast-wrap"></div>

<script>
  const API = 'https://kharch-backend.onrender.com';


  const CAT_COLORS = {
    food: 'var(--cat-food)',
    transport: 'var(--cat-transport)',
    housing: 'var(--cat-housing)',
    utilities: 'var(--cat-utilities)',
    healthcare: 'var(--cat-healthcare)',
    entertainment: 'var(--cat-entertainment)',
    education: 'var(--cat-education)',
    shopping: 'var(--cat-shopping)',
    travel: 'var(--cat-travel)',
    other: 'var(--cat-other)',
  };

  let sortDateDesc = false;

  // Set today's date as default
  document.getElementById('date').value = new Date().toISOString().split('T')[0];

  // Idempotency key per submission attempt (regenerated on each new form interaction)
  let currentKey = newKey();
  function newKey() { return crypto.randomUUID(); }

  // Regenerate key when user starts editing the form (prevents accidental reuse)
  ['amount','category','description','date'].forEach(id => {
    document.getElementById(id).addEventListener('input', () => {
      currentKey = newKey();
    });
  });

  function toggleSort() {
    sortDateDesc = !sortDateDesc;
    const btn = document.getElementById('sort-btn');
    btn.textContent = sortDateDesc ? '↕ Date: Newest first' : '↕ Date: Oldest first';
    btn.classList.toggle('active', sortDateDesc);
    loadExpenses();
  }

  async function loadExpenses() {
    const category = document.getElementById('filter-category').value;
    const params = new URLSearchParams();
    if (category) params.set('category', category);
    params.set('sort', sortDateDesc ? 'date_desc' : 'date_asc');

    const listEl = document.getElementById('expense-list');
    const countEl = document.getElementById('count-label');

    try {
      const res = await fetch(`${API}/expenses?${params}`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const json = await res.json();

      // Update total
      document.getElementById('total-display').textContent = '₹' + Number(json.total).toLocaleString('en-IN', {minimumFractionDigits: 2});
      countEl.textContent = `${json.count} expense${json.count !== 1 ? 's' : ''}`;

      if (json.data.length === 0) {
        listEl.innerHTML = `
          <div class="empty-state">
            <div class="icon">🪙</div>
            <p>No expenses yet.<br/>Add one using the form.</p>
          </div>`;
        return;
      }

      listEl.innerHTML = json.data.map(e => {
        const color = CAT_COLORS[e.category] || CAT_COLORS.other;
        const dateStr = new Date(e.date + 'T00:00:00').toLocaleDateString('en-IN', {day:'numeric', month:'short', year:'numeric'});
        const amountStr = '₹' + Number(e.amount).toLocaleString('en-IN', {minimumFractionDigits: 2});
        return `
          <div class="expense-card">
            <div class="cat-dot" style="background:${color}"></div>
            <div class="card-body">
              <div class="card-desc">${escHtml(e.description)}</div>
              <div class="card-meta">
                <span class="cat-badge" style="color:${color}">${e.category}</span>
                <span>${dateStr}</span>
              </div>
            </div>
            <div class="card-amount">${amountStr}</div>
          </div>`;
      }).join('');

    } catch (err) {
      listEl.innerHTML = `<div class="error-state">Could not load expenses.<br/><small>${err.message}</small></div>`;
      countEl.textContent = '';
    }
  }

  async function submitExpense() {
    const btn = document.getElementById('submit-btn');
    const amount = document.getElementById('amount').value;
    const category = document.getElementById('category').value;
    const description = document.getElementById('description').value.trim();
    const date = document.getElementById('date').value;

    if (!amount || !category || !description || !date) {
      toast('Please fill in all fields.', 'error');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Saving…';

    try {
      const res = await fetch(`${API}/expenses`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          amount: parseFloat(amount),
          category,
          description,
          date,
          idempotency_key: currentKey,
        }),
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.detail || `HTTP ${res.status}`);
      }

      toast('Expense added!', 'success');

      // Reset form and generate a new idempotency key
      document.getElementById('amount').value = '';
      document.getElementById('category').value = '';
      document.getElementById('description').value = '';
      document.getElementById('date').value = new Date().toISOString().split('T')[0];
      currentKey = newKey();

      loadExpenses();

    } catch (err) {
      toast(err.message || 'Failed to save expense.', 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Add Expense';
    }
  }

  function toast(msg, type = 'success') {
    const wrap = document.getElementById('toast-wrap');
    const el = document.createElement('div');
    el.className = `toast ${type}`;
    el.textContent = msg;
    wrap.appendChild(el);
    setTimeout(() => el.remove(), 3000);
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // Initial load
  loadExpenses();
</script>
</body>
</html>
